<style>
:root{--ivory:#F8F4EC;--ink:#24221C;--graphite:#5C564C;--stone:#938B7E;--hair:#E2DACB;--acc:#2C4A3A;
--serif:'Playfair Display',Georgia,serif;--sans:'Mulish',system-ui,sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--ivory);color:var(--ink);min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.65;-webkit-font-smoothing:antialiased}
.ty{max-width:620px;text-align:center}
.eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--acc);margin-bottom:30px}
.mark{width:66px;height:66px;margin:0 auto 32px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center}
.mark svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2}
h1{font-family:var(--serif);font-weight:500;font-size:clamp(2.1rem,5vw,3.2rem);line-height:1.12;margin-bottom:22px}
.lede{font-size:clamp(1.04rem,1.7vw,1.22rem);color:var(--graphite);max-width:46ch;margin:0 auto 14px}
.rule{width:48px;height:1px;background:var(--acc);margin:36px auto}
.note{font-size:.92rem;color:var(--stone);margin-top:8px}
.back{display:inline-block;margin-top:40px;font-size:.74rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid var(--hair);padding-bottom:4px}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
  <div class="ty">
    <div class="eyebrow">Центр профессора Блюма</div>
    <div class="mark"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
    <h1>Заявка принята.</h1>
    <p class="lede">Врач изучит ваш запрос и предложит индивидуальную программу восстановления энергии. Ответим в течение дня по выбранному каналу.</p>
    <div class="rule"></div>
    /*<p class="note">Срочный вопрос — пишите в WhatsApp или Telegram.</p>*/
    <a class="back" href="/longevity">Вернуться на страницу</a>
  </div>
</body>
