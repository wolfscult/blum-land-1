<style>
:root{--paper:#F5F1E9;--ink:#1F1C1A;--graphite:#5A534C;--stone:#8E867C;--hair:#D8D0C4;--ox:#7A2E39;
--serif:'Spectral',Georgia,serif;--sans:'Golos Text',system-ui,sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.62;-webkit-font-smoothing:antialiased}
.ty{max-width:620px;text-align:center}
.eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--ox);margin-bottom:30px}
.mark{width:64px;height:64px;margin:0 auto 34px;border:1px solid var(--ox);border-radius:50%;display:flex;align-items:center;justify-content:center}
.mark svg{width:26px;height:26px;stroke:var(--ox);fill:none;stroke-width:1.4}
h1{font-family:var(--serif);font-weight:300;font-size:clamp(2.1rem,5vw,3.2rem);line-height:1.1;letter-spacing:-.01em;margin-bottom:22px}
.lede{font-size:clamp(1.02rem,1.7vw,1.2rem);color:var(--graphite);max-width:46ch;margin:0 auto 14px}
.rule{display:flex;align-items:center;justify-content:center;margin:38px 0}
.rule::before{content:"";width:48px;height:2px;background:var(--ox)}
.note{font-size:.92rem;color:var(--stone);margin-top:8px}
.back{display:inline-block;margin-top:40px;font-size:.74rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid var(--hair);padding-bottom:4px}
a{color:inherit;text-decoration:none}
