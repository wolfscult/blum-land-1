<style>
:root{--bg:#FFFFFF;--bg2:#F6F6F4;--ink:#14161A;--muted:#5B6168;--dim:#9AA0A6;--hair:#E6E6E2;--acc:#1F6F66;
--sans:'IBM Plex Sans',system-ui,sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6;-webkit-font-smoothing:antialiased}
.ty{max-width:560px;text-align:center;background:var(--bg2);border:1px solid var(--hair);border-radius:14px;padding:clamp(36px,6vw,56px)}
.eyebrow{font-size:.74rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:26px}
.mark{width:56px;height:56px;margin:0 auto 28px;background:rgba(31,111,102,.1);border:1.5px solid var(--acc);border-radius:14px;display:flex;align-items:center;justify-content:center}
.mark svg{width:24px;height:24px;stroke:var(--acc);fill:none;stroke-width:2.4}
h1{font-weight:600;font-size:clamp(1.7rem,4vw,2.3rem);line-height:1.2;letter-spacing:-.01em;margin-bottom:18px}
.lede{font-size:1rem;color:var(--muted);max-width:42ch;margin:0 auto 14px}
.rule{width:40px;height:1px;background:var(--hair);margin:30px auto}
.note{font-size:.86rem;color:var(--dim);margin-top:8px}
.back{display:inline-block;margin-top:34px;font-size:.82rem;font-weight:600;color:var(--acc);border-bottom:1px solid var(--hair);padding-bottom:4px}
a{color:inherit;text-decoration:none}
</style>
</head>

    <div class="rule"></div>
